name: Garden Keeper

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install Python and Dependencies
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install jupyter matplotlib

      - name: Refresh popular-posts fallback
        continue-on-error: true
        run: |
          tmp="$(mktemp)"
          if curl -fsS --max-time 20 https://luozx.org/popular.json -o "$tmp" \
            && python3 -c "import json,sys; d=json.load(open('$tmp')); sys.exit(0 if isinstance(d.get('items'), list) and len(d['items']) > 0 else 1)"; then
            mv "$tmp" assets/data/popular-posts.json
            echo "Refreshed fallback from production worker ($(python3 -c "import json;print(json.load(open('assets/data/popular-posts.json'))['updatedAt'])"))."
          else
            echo "Worker unavailable or returned empty; keeping committed fallback."
            rm -f "$tmp"
          fi

      - name: Render Quarto Project
        uses: quarto-dev/quarto-actions/render@v2
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
