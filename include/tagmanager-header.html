<!-- Google Tag Manager -->
<script>
(() => {
  const disabledHosts = new Set(["127.0.0.1", "localhost"]);
  if (disabledHosts.has(window.location.hostname)) {
    return;
  }

  const containerId = "GTM-NVV5S5NQ";
  const dataLayerName = "dataLayer";
  window[dataLayerName] = window[dataLayerName] || [];

  const loadTagManager = () => {
    if (window.__gardenGtmLoaded) {
      return;
    }
    window.__gardenGtmLoaded = true;
    window[dataLayerName].push({ "gtm.start": Date.now(), event: "gtm.js" });

    const script = document.createElement("script");
    script.async = true;
    script.src = `https://www.googletagmanager.com/gtm.js?id=${containerId}`;
    document.head.append(script);
  };

  const scheduleTagManager = () => {
    if ("requestIdleCallback" in window) {
      window.requestIdleCallback(loadTagManager, { timeout: 3000 });
      return;
    }
    window.setTimeout(loadTagManager, 1500);
  };

  if (document.readyState === "complete") {
    scheduleTagManager();
  } else {
    window.addEventListener("load", scheduleTagManager, { once: true });
  }
})();
</script>
<!-- End Google Tag Manager -->
